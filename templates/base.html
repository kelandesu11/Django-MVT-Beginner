<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}University Course Directory{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        nav {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ccc;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0066cc;
        }

        nav a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 40px;
            padding-top: 10px;
            border-top: 1px solid #ccc;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>University Course Directory</h1>

        <nav>
            <a href="/">Home</a>
            <a href="/departments/">Departments</a>
            <a href="/courses/">Courses</a>
            <a href="/admin/">Admin</a>
            <a href="/api/">API</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        Django MVT + DRF Assignment
    </footer>

</body>
</html>
