{% extends "base.html" %}

{% block title %}Courses{% endblock %}

{% block content %}
<h2>Courses</h2>

<ul>
    {% for course in courses %}
        <li>
            <a href="{% url 'course_detail' course.id %}">
                {{ course.course_code }} - {{ course.title }}
            </a>
        </li>
    {% empty %}
        <li>No courses found.</li>
    {% endfor %}
</ul>
{% endblock %}
