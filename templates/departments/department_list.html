{% extends 'base.html' %}

{% block content %}
    <h1>Departments</h1>

{% for department in departments %}
    <div>
        <h2>{{ department.name }}</h2>
        <p>Code: {{ department.code }}</p>
        <p>Building: {{ department.building_name }}</p>
        <a href="{% url 'department_detail' department.id %}">View Details</a>
    </div>
    <hr>
{% empty %}
    <p>No departments found.</p>
{% endfor %}
{% endblock %}
